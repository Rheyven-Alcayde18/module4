<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Module 4 Reviewer — ITEP 101 Human Computer Interaction</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1916; --text2: #6b6a65; --text3: #9e9d98;
    --accent: #185FA5; --accent-light: #E6F1FB; --accent-dark: #042C53;
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #085041;
    --red: #A32D2D; --red-light: #FCEBEB; --red-dark: #501313;
    --amber-light: #FAEEDA; --amber-dark: #633806;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1916; --surface: #232320; --surface2: #2c2c28;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0efe9; --text2: #9e9d98; --text3: #6b6a65;
      --teal-light: #0a3d2b; --teal-dark: #9FE1CB;
      --accent-light: #0c2a4a; --accent-dark: #B5D4F4;
      --red-light: #3a1212; --red-dark: #F09595;
      --amber-light: #2e1f05; --amber-dark: #FAC775;
    }
  }
  html { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .topbar { width: 100%; max-width: 680px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
  .topbar-logo { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
  .topbar-badge { font-size: 12px; background: var(--accent-light); color: var(--accent); padding: 4px 12px; border-radius: 99px; font-weight: 500; }
  .hero { width: 100%; max-width: 680px; margin-bottom: 2rem; }
  .hero h1 { font-size: clamp(26px, 5vw, 36px); font-weight: 600; line-height: 1.2; color: var(--text); letter-spacing: -0.02em; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 15px; color: var(--text2); margin-top: 8px; line-height: 1.6; }
  .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 1.25rem; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .progress-bar-bg { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 5px; background: var(--accent); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .stats { display: flex; gap: 10px; width: 100%; max-width: 680px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 80px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .stat.green .stat-val { color: var(--teal); }
  .stat.red .stat-val { color: var(--red); }
  .q-card { width: 100%; max-width: 680px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem 1.75rem; animation: fadein 0.3s ease; }
  @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .q-type-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 99px; margin-bottom: 14px; }
  .pill-mc { background: var(--accent-light); color: var(--accent); }
  .pill-id { background: var(--teal-light); color: var(--teal-dark); }
  .q-text { font-size: 16px; line-height: 1.65; color: var(--text); margin-bottom: 1.25rem; font-weight: 400; }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { text-align: left; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 11px 15px; font-size: 14px; color: var(--text); cursor: pointer; transition: all 0.15s ease; line-height: 1.5; font-family: 'DM Sans', sans-serif; }
  .choice:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
  .choice.correct { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); font-weight: 500; }
  .choice.wrong { background: var(--red-light); border-color: var(--red); color: var(--red-dark); }
  .id-row { display: flex; gap: 8px; }
  .id-input { flex: 1; font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 10px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .id-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.15); }
  .id-input.correct { border-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); }
  .id-input.wrong { border-color: var(--red); background: var(--red-light); color: var(--red-dark); }
  .check-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .check-btn:hover:not(:disabled) { background: var(--accent-dark); }
  .check-btn:disabled { opacity: 0.5; cursor: default; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .feedback { margin-top: 14px; font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); line-height: 1.6; display: none; }
  .feedback.correct { background: var(--teal-light); color: var(--teal-dark); display: block; }
  .feedback.wrong { background: var(--red-light); color: var(--red-dark); display: block; }
  .explanation { margin-top: 10px; font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); line-height: 1.6; background: var(--amber-light); color: var(--amber-dark); display: none; border-left: 3px solid #EF9F27; }
  .explanation.show { display: block; }
  .actions { width: 100%; max-width: 680px; display: none; margin-top: 14px; }
  .next-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 11px 24px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .next-btn:hover { background: var(--accent-dark); }
  .results-card { width: 100%; max-width: 680px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 3rem 2rem; text-align: center; animation: fadein 0.4s ease; }
  .results-emoji { font-size: 48px; margin-bottom: 12px; }
  .results-score { font-size: 56px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent); line-height: 1; }
  .results-denom { font-size: 28px; font-weight: 400; color: var(--text3); }
  .results-pct { font-size: 18px; font-weight: 500; color: var(--text2); margin-top: 6px; font-family: 'DM Mono', monospace; }
  .results-msg { font-size: 15px; color: var(--text2); margin: 1.5rem auto; max-width: 420px; line-height: 1.7; }
  .restart-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 12px 32px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .restart-btn:hover { background: var(--accent-dark); }
  footer { margin-top: 3rem; font-size: 12px; color: var(--text3); text-align: center; }
  @media (max-width: 480px) {
    body { padding: 1.25rem 0.75rem 3rem; }
    .q-card { padding: 1.25rem; }
    .id-row { flex-direction: column; }
    .check-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ITEP 101 · HCI</span>
  <span class="topbar-badge">Module 4</span>
</div>
<div class="hero">
  <h1>Usability<br/><span>Evaluation</span> Reviewer</h1>
  <p>25 questions · Multiple choice & identification · Shuffled every session</p>
</div>
<div class="progress-wrap">
  <div class="progress-meta">
    <span class="progress-label" id="prog-label">0 / 25</span>
    <span class="progress-label" id="prog-pct">0%</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-val" id="s-q">1</div><div class="stat-lbl">Question</div></div>
  <div class="stat green"><div class="stat-val" id="s-c">0</div><div class="stat-lbl">Correct</div></div>
  <div class="stat red"><div class="stat-val" id="s-w">0</div><div class="stat-lbl">Wrong</div></div>
  <div class="stat"><div class="stat-val" id="s-t">25</div><div class="stat-lbl">Total</div></div>
</div>
<div id="q-area"></div>
<div class="actions" id="actions">
  <button class="next-btn" onclick="next()">Next question <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
</div>
<footer>Module 4 · ITEP 101 · Human Computer Interaction · Usability Evaluation Techniques</footer>
<script>
const QUESTIONS = [
  { type:'mc', q:'What is the main purpose of usability evaluation?', choices:['To market the product to users','To provide feedback on usability problems and validate usability of a system','To replace user testing with automated tools','To reduce the cost of development'], answer:1, explanation:'Usability evaluation methods contribute to systems development by providing feedback on usability problems and validating whether a system is usable. It is not about marketing or cost-cutting alone.' },
  { type:'mc', q:'Which type of evaluation is conducted DURING the development process to identify and fix problems early?', choices:['Summative Evaluation','Baseline Evaluation','Formative Evaluation','Field Evaluation'], answer:2, explanation:'Formative Evaluation is conducted during development. Its main goal is to refine the system early — through prototypes, simulations, or early versions — reducing the risk of expensive rework before the final product is completed.' },
  { type:'mc', q:'Which type of evaluation is conducted at the LATER stage or AFTER development to measure if the product meets requirements?', choices:['Formative Evaluation','Summative Evaluation','Cognitive Evaluation','Inquiry Evaluation'], answer:1, explanation:'Summative Evaluation is formal and happens at a later stage or after development. It measures user satisfaction, performance standards, and whether the system is ready for release.' },
  { type:'mc', q:'Which of the following is NOT one of the three main usability evaluation methods?', choices:['Testing','Inspection','Inquiry','Benchmarking'], answer:3, explanation:'The three main usability evaluation methods are Testing, Inspection, and Inquiry. Benchmarking is not listed as one of them in the module.' },
  { type:'mc', q:'In the Testing approach, who works on typical tasks using the system?', choices:['Usability specialists','Software developers','Representative users','Project managers'], answer:2, explanation:'In the Testing approach, representative users work on typical tasks using the system or prototype. Evaluators then observe the results to see how the interface supports users in doing their tasks.' },
  { type:'mc', q:'Which testing method allows participants to ask system-related questions of an expert during the test?', choices:['Co-discovery Learning','Performance Measurement','Coaching Method','Remote Testing'], answer:2, explanation:'The Coaching Method allows participants to ask any system-related questions of an expert coach during the usability test. The coach answers to the best of their ability, guiding users when they get stuck.' },
  { type:'mc', q:'In Co-discovery Learning, how many test users attempt to perform tasks together?', choices:['One','Two','Three','Four'], answer:1, explanation:'In Co-discovery Learning, two test users work together to perform tasks, helping each other just as they would when collaborating in real life. This simulates natural teamwork and reveals social interaction patterns.' },
  { type:'mc', q:'Performance Measurement should be conducted in a _____ so data can be collected accurately.', choices:['User\'s home','Informal office setting','Formal usability laboratory','Online environment'], answer:2, explanation:'Performance Measurement requires a formal usability laboratory so that quantitative data can be collected accurately and unexpected interference (noise, distractions, etc.) is minimized.' },
  { type:'mc', q:'Which testing method is used when testers are separated in space and/or time from the participants?', choices:['Coaching Method','Co-discovery Learning','Performance Measurement','Remote Testing'], answer:3, explanation:'Remote Testing is used when testers and participants are separated in space or time, meaning the tester cannot directly observe the testing process. Participants are usually not in a formal usability lab.' },
  { type:'mc', q:'In the Inspection approach, who primarily examines usability-related aspects of a user interface?', choices:['End users only','Usability specialists (and sometimes developers, users, and other professionals)','Marketing teams','Project stakeholders only'], answer:1, explanation:'In Usability Inspection, usability specialists — and sometimes software developers, users, and other professionals — examine usability-related aspects of a user interface. It is expert-driven, unlike testing which involves real users.' },
  { type:'mc', q:'Cognitive Walkthrough focuses on evaluating a user interface for its:', choices:['Visual aesthetics and branding','Understandability and ease of learning','Performance speed and load times','Cost and development time'], answer:1, explanation:'Cognitive Walkthrough involves evaluators going through tasks to assess the interface\'s understandability and ease of learning. It is especially useful for evaluating how easy it is for new users to learn the system.' },
  { type:'mc', q:'Heuristic Evaluation was developed by:', choices:['Donald Norman and Steve Jobs','Jakob Nielsen and Rolf Molich','Bill Gates and Alan Turing','Tim Berners-Lee and Vint Cerf'], answer:1, explanation:'Heuristic Evaluation was developed by Jakob Nielsen and Rolf Molich. It uses a set of general heuristics (guidelines or rules of thumb) to critique a user interface in a structured way.' },
  { type:'mc', q:'A heuristic in the context of usability evaluation is best described as:', choices:['A strict legal requirement','A programming algorithm','A guideline or general principle to guide design decisions','A statistical formula for measuring performance'], answer:2, explanation:'A heuristic is a guideline, general principle, or rule of thumb that can guide a design decision or be used to critique a decision that has already been made. It is flexible, not a strict rule.' },
  { type:'mc', q:'Pluralistic Walkthrough is a group inspection method. What is its key advantage?', choices:['It is the cheapest method available','It provides a diverse range of skills and perspectives','It requires no preparation beforehand','It can only be done remotely'], answer:1, explanation:'Pluralistic Walkthrough involves a group of people — bringing diverse skills and perspectives. The more people looking for problems, the higher the probability of finding them. This is its primary advantage.' },
  { type:'mc', q:'In the Inquiry approach, evaluators obtain information about users through which of the following?', choices:['Automated scripts only','Talking to users, observing them, or having them answer questions','Only reading system logs','Only reviewing the source code'], answer:1, explanation:'In the Inquiry approach, evaluators gather information by talking to users, observing them in real work environments, or letting them answer questions verbally or in written form (e.g., questionnaires or interviews).' },
  { type:'mc', q:'In a Focus Group, approximately how many users are brought together to discuss system issues?', choices:['2 to 3','6 to 9','10 to 15','20 or more'], answer:1, explanation:'A Focus Group typically brings together 6 to 9 users. A human factors engineer moderates the discussion, preparing a list of issues beforehand and gathering the needed information from the group.' },
  { type:'mc', q:'Which inquiry method involves having the computer automatically collect statistics about system use?', choices:['Field Observation','Focus Group','Logging Actual Users','Questionnaires'], answer:2, explanation:'Logging Actual Users involves having the computer automatically collect statistics about detailed system use. It is useful for capturing how users perform real work across a large number of users working in different circumstances.' },
  { type:'mc', q:'Which factor distinguishing evaluation techniques refers to the risk that the measurement process itself can change how the user behaves?', choices:['Level of subjectivity','Immediacy of response','Resources required','Type of measures provided'], answer:1, explanation:'Immediacy of response is the factor that describes this risk. Methods like think-aloud record behavior in real time, but because the user knows they are being observed, the measurement process itself may alter how they behave.' },
  { type:'mc', q:'What are the two main types of measurement provided by evaluation techniques?', choices:['Formal and informal measurement','Quantitative and qualitative measurement','Manual and automated measurement','Static and dynamic measurement'], answer:1, explanation:'The two main types of measurement are quantitative (numeric, analyzable with statistics) and qualitative (descriptive, subjective insights). The module lists "type of measures provided" as a key factor when choosing an evaluation method.' },
  { type:'id', q:'What are the three main categories of usability evaluation methods?', answer:'testing, inspection, inquiry', alt:['testing inspection inquiry','inquiry inspection testing'], explanation:'The three main usability evaluation methods are Testing (users perform tasks), Inspection (specialists examine the interface), and Inquiry (gathering information from users through observation or questions).' },
  { type:'id', q:'What inspection method involves a group walking through tasks together, bringing diverse skills to find usability problems?', answer:'pluralistic walkthrough', alt:['pluralistic'], explanation:'Pluralistic Walkthrough is a group walkthrough inspection. Its advantage is that a diverse group of people — designers, developers, and users — look for problems together, increasing the chance of finding issues.' },
  { type:'id', q:'What inquiry method involves human factors engineers going to a user\'s workplace to observe them work?', answer:'field observation', alt:['field observation method'], explanation:'Field Observation involves human factors engineers visiting representative users\' workplaces to observe how they use the system and understand their mental models. It can be used during test and deployment stages.' },
  { type:'id', q:'What is the inquiry method where human factors engineers formulate and ask users specific questions about the product?', answer:'interviews', alt:['interview'], explanation:'Interviews involve human factors engineers formulating questions about the product and then interviewing representative users to gather the desired information. They can be structured (fixed questions) or unstructured (open-ended).' },
  { type:'id', q:'What technique involves having the computer automatically collect statistics about detailed system use from many users?', answer:'logging actual users', alt:['logging','user logging'], explanation:'Logging Actual Users uses the computer to automatically collect detailed usage statistics. It is powerful because it captures real-world behavior from a large number of users working under different circumstances.' },
  { type:'id', q:'Who developed Heuristic Evaluation?', answer:'jakob nielsen and rolf molich', alt:['nielsen and molich','jakob nielsen','nielsen molich'], explanation:'Heuristic Evaluation was developed by Jakob Nielsen and Rolf Molich. It is a method for structuring the critique of a system using simple and general heuristics (rules of thumb), making it an efficient and widely used inspection technique.' },
];

let questions=[], idx=0, score=0, wrong=0, answered=false;
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
function start(){ questions=shuffle([...QUESTIONS]); idx=0; score=0; wrong=0; answered=false; updateStats(); render(); }

function updateStats(){
  const total=questions.length, pct=Math.round(idx/total*100);
  document.getElementById('s-q').textContent=Math.min(idx+1,total);
  document.getElementById('s-c').textContent=score;
  document.getElementById('s-w').textContent=wrong;
  document.getElementById('s-t').textContent=total;
  document.getElementById('prog-label').textContent=idx+' / '+total;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=pct+'%';
}

function render(){
  if(idx>=questions.length){ showResults(); return; }
  const q=questions[idx]; answered=false;
  document.getElementById('actions').style.display='none';
  if(q.type==='mc') renderMC(q); else renderID(q);
  updateStats();
}

function renderMC(q){
  const shuffled=shuffle(q.choices.map((c,i)=>({c,i})));
  document.getElementById('q-area').innerHTML=`
    <div class="q-card">
      <span class="q-type-pill pill-mc"><i class="ti ti-list-check" aria-hidden="true"></i> Multiple Choice</span>
      <p class="q-text">${q.q}</p>
      <div class="choices">
        ${shuffled.map(({c,i})=>`<button class="choice" data-idx="${i}" onclick="pickMC(this,${q.answer})">${c}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="explanation" id="exp"><i class="ti ti-bulb" aria-hidden="true"></i> <strong>Explanation:</strong> ${q.explanation}</div>
    </div>`;
}

function pickMC(btn,correct){
  if(answered) return; answered=true;
  const chosen=parseInt(btn.dataset.idx);
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    const bi=parseInt(b.dataset.idx);
    if(bi===correct) b.classList.add('correct');
    else if(bi===chosen&&chosen!==correct) b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  if(chosen===correct){ score++; fb.className='feedback correct'; fb.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Correct!'; }
  else { wrong++; fb.className='feedback wrong'; fb.innerHTML='<i class="ti ti-x" aria-hidden="true"></i> Incorrect. The correct answer is highlighted in green.'; }
  document.getElementById('exp').classList.add('show');
  document.getElementById('actions').style.display='block'; updateStats();
}

function renderID(q){
  document.getElementById('q-area').innerHTML=`
    <div class="q-card">
      <span class="q-type-pill pill-id"><i class="ti ti-pencil" aria-hidden="true"></i> Identification</span>
      <p class="q-text">${q.q}</p>
      <div class="id-row">
        <input class="id-input" id="id-ans" type="text" placeholder="Type your answer..." autocomplete="off" onkeydown="if(event.key==='Enter')checkID()"/>
        <button class="check-btn" id="chk-btn" onclick="checkID()">Check</button>
      </div>
      <p class="hint">Case-insensitive · Key terms accepted</p>
      <div class="feedback" id="fb"></div>
      <div class="explanation" id="exp"><i class="ti ti-bulb" aria-hidden="true"></i> <strong>Explanation:</strong> ${q.explanation}</div>
    </div>`;
  document.getElementById('id-ans').focus();
}

function checkID(){
  if(answered) return;
  const q=questions[idx], inp=document.getElementById('id-ans'), val=inp.value.trim().toLowerCase();
  if(!val) return;
  answered=true; inp.disabled=true; document.getElementById('chk-btn').disabled=true;
  const accepted=[q.answer,...(q.alt||[])];
  const correct=accepted.some(a=>val===a||val.includes(a)||a.includes(val));
  const fb=document.getElementById('fb');
  const display=q.answer.charAt(0).toUpperCase()+q.answer.slice(1);
  if(correct){ score++; inp.classList.add('correct'); fb.className='feedback correct'; fb.innerHTML=`<i class="ti ti-check" aria-hidden="true"></i> Correct! <strong>${display}</strong>`; }
  else { wrong++; inp.classList.add('wrong'); fb.className='feedback wrong'; fb.innerHTML=`<i class="ti ti-x" aria-hidden="true"></i> Incorrect. Answer: <strong>${display}</strong>`; }
  document.getElementById('exp').classList.add('show');
  document.getElementById('actions').style.display='block'; updateStats();
}

function next(){ idx++; render(); }

function showResults(){
  const total=questions.length, pct=Math.round(score/total*100);
  document.getElementById('prog-label').textContent=total+' / '+total;
  document.getElementById('prog-pct').textContent='100%';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('actions').style.display='none';
  const emoji=pct>=90?'🏆':pct>=75?'🎉':pct>=50?'📚':'💪';
  const msg=pct>=90?'Excellent! You\'ve mastered Usability Evaluation Techniques.':
             pct>=75?'Great job! Review a few concepts and you\'ll be fully prepared.':
             pct>=50?'Good effort. A bit more review of the evaluation methods will help.':
             'Keep going! Re-read Module 4 and try again — you can do it!';
  document.getElementById('q-area').innerHTML=`
    <div class="results-card">
      <div class="results-emoji">${emoji}</div>
      <div><span class="results-score">${score}</span><span class="results-denom"> / ${total}</span></div>
      <div class="results-pct">${pct}%</div>
      <p class="results-msg">${msg}</p>
      <button class="restart-btn" onclick="start()"><i class="ti ti-refresh" aria-hidden="true"></i> Retake Quiz</button>
    </div>`;
}
start();
</script>
</body>
</html>
